
<style>
*{box-sizing:border-box;margin:0;padding:0;}

.wrap{padding:1.5rem;font-family:var(--font-sans);}

.preview-scene{
  width:100%;min-height:340px;
  background: linear-gradient(160deg,#0e0720 0%,#160d35 40%,#0a1a2e 100%);
  border-radius:16px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

.scanline{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:1;
}

/* ── The card ── */
.popup-s6{
  width:320px;
  background:rgba(8,4,20,0.92);
  border-radius:12px;
  border:1px solid rgba(255,120,200,0.35);
  overflow:hidden;
  position:absolute;
  animation:waifu-pop 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
  z-index:10;
}
@keyframes waifu-pop{
  0%{transform:scale(0.4) rotate(-6deg) translateY(40px);opacity:0;}
  60%{transform:scale(1.06) rotate(1deg);}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}

/* header strip */
.s6-header{
  display:flex;align-items:stretch;
  border-bottom:1px solid rgba(255,120,200,0.2);
  position:relative;overflow:hidden;
}
.s6-side-art{
  width:90px;flex-shrink:0;
  background:linear-gradient(175deg,#2d0a5e,#1a0535,#0a1040);
  display:flex;align-items:flex-end;justify-content:center;
  padding-top:6px;
  position:relative;overflow:hidden;
}
.s6-side-art::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(255,120,200,0.03) 0px,rgba(255,120,200,0.03) 1px,transparent 1px,transparent 8px);
}
.char-sprite{
  font-size:64px;line-height:1;
  animation:charFloat 3s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(255,120,200,0.7));
  position:relative;z-index:1;
}
@keyframes charFloat{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-6px) rotate(1deg);}}

.s6-header-info{
  flex:1;padding:10px 10px 10px 12px;
  background:linear-gradient(90deg,rgba(45,10,94,0.6),rgba(10,16,64,0.8));
  display:flex;flex-direction:column;justify-content:center;gap:4px;
}
.s6-app-name{font-size:10px;color:rgba(255,160,220,0.7);letter-spacing:1.5px;text-transform:uppercase;}
.s6-char-name{font-size:15px;color:#ffe0f4;font-weight:600;display:flex;align-items:center;gap:6px;}
.s6-online-dot{width:7px;height:7px;border-radius:50%;background:#ff6eb4;animation:pulse-dot 1.5s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(255,110,180,0.6);}50%{box-shadow:0 0 0 5px rgba(255,110,180,0);}}
.s6-char-role{font-size:11px;color:rgba(200,150,255,0.8);}
.s6-close{position:absolute;top:8px;right:10px;color:rgba(255,160,220,0.5);font-size:18px;cursor:pointer;line-height:1;transition:color 0.2s;}
.s6-close:hover{color:#ff6eb4;}

/* message bubbles */
.s6-body{padding:12px 14px 8px;}
.bubble-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px;}
.bubble-row.right{flex-direction:row-reverse;}
.mini-avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:1.5px solid rgba(255,120,200,0.4);}
.mini-avatar.char{background:linear-gradient(135deg,#4a1060,#1a0a40);}
.mini-avatar.user{background:linear-gradient(135deg,#0a2a4a,#082040);}
.msg-bubble{
  max-width:200px;padding:8px 11px;border-radius:12px;
  font-size:12px;line-height:1.5;
  animation:msgIn 0.3s ease both;
}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-bubble.char{
  background:rgba(80,20,120,0.7);
  border:1px solid rgba(255,120,200,0.25);
  color:#f0d0ff;
  border-radius:2px 12px 12px 12px;
}
.msg-bubble.user{
  background:rgba(10,30,80,0.8);
  border:1px solid rgba(100,160,255,0.25);
  color:#c0d8ff;
  border-radius:12px 2px 12px 12px;
}
.msg-bubble.system{
  background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,200,100,0.2);
  color:#ffe8a0;
  border-radius:8px;
  font-size:11px;
  text-align:center;
  margin:0 auto 10px;
  padding:5px 12px;
}
.typing-dots{display:flex;gap:4px;padding:10px 14px;align-items:center;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,120,200,0.7);animation:typeDot 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes typeDot{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-5px);opacity:1;}}

/* stat chips */
.s6-stats{
  display:flex;gap:6px;padding:0 14px 10px;
}
.stat-chip{
  flex:1;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,120,200,0.15);
  border-radius:8px;padding:6px 8px;text-align:center;
}
.stat-chip .num{font-size:16px;font-weight:700;color:#ff9de2;}
.stat-chip .lbl{font-size:10px;color:rgba(200,150,255,0.6);margin-top:1px;}

/* heart bar */
.s6-affection{padding:0 14px 12px;display:flex;align-items:center;gap:8px;}
.affection-label{font-size:10px;color:rgba(255,160,220,0.6);white-space:nowrap;}
.affection-track{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden;}
.affection-fill{height:100%;background:linear-gradient(90deg,#c026d3,#ff6eb4,#fbbf24);border-radius:5px;animation:fillUp 1.8s ease-out both;}
@keyframes fillUp{from{width:0%;}to{width:78%;}}
.affection-hearts{font-size:12px;color:#ff6eb4;animation:heartbeat 1s ease-in-out infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}

/* footer */
.s6-footer{
  padding:10px 14px 12px;
  border-top:1px solid rgba(255,120,200,0.12);
  display:flex;gap:8px;
}
.s6-btn{
  flex:1;padding:8px 0;border-radius:8px;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.3px;
}
.s6-btn.ign{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,120,200,0.2);
  color:rgba(255,160,220,0.7);
}
.s6-btn.ign:hover{background:rgba(255,255,255,0.1);}
.s6-btn.main{
  background:linear-gradient(90deg,#9d3fbe,#e040a0);
  color:white;
}
.s6-btn.main:hover{filter:brightness(1.15);transform:translateY(-1px);}

/* bottom controls */
.controls-row{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ctrl-btn{
  padding:7px 16px;border-radius:20px;
  border:1.5px solid rgba(255,120,200,0.3);
  background:rgba(255,120,200,0.08);
  color:rgba(255,200,240,0.9);
  font-size:12px;cursor:pointer;transition:all 0.2s;
}
.ctrl-btn:hover{background:rgba(255,120,200,0.18);border-color:rgba(255,120,200,0.6);}
.ctrl-btn.active{background:rgba(255,110,180,0.25);border-color:#ff6eb4;color:#ff9de2;font-weight:600;}

.pos-row{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
.pos-btn{
  padding:6px 14px;border-radius:8px;
  border:1px solid var(--color-border-secondary);
  background:var(--color-background-primary);
  color:var(--color-text-secondary);
  font-size:12px;cursor:pointer;transition:all 0.2s;
}
.pos-btn:hover{background:var(--color-background-secondary);}

.section-label{font-size:12px;color:var(--color-text-secondary);font-weight:500;margin-bottom:8px;}
</style>

<div class="wrap">
  <h2 class="sr-only">宅男风格二次元系统弹窗——老婆通知卡片</h2>

  <div class="preview-scene" id="scene">
    <div class="stars" id="stars"></div>
    <div class="scanline"></div>
    <div id="popup-wrap">
      <!-- popup rendered here -->
    </div>
  </div>

  <div class="controls-row">
    <span class="section-label">切换老婆：</span>
    <button class="ctrl-btn active" onclick="setChar(0,this)">🌸 神里绫华</button>
    <button class="ctrl-btn" onclick="setChar(1,this)">⚡ 雷电将军</button>
    <button class="ctrl-btn" onclick="setChar(2,this)">🔥 诺艾尔</button>
    <button class="ctrl-btn" onclick="setChar(3,this)">🌙 甘雨</button>
    <button class="ctrl-btn" onclick="replayAnim()">↺ 重播入场</button>
  </div>

  <div class="pos-row">
    <button class="pos-btn" onclick="setPos('center')">居中</button>
    <button class="pos-btn" onclick="setPos('top-right')">右上</button>
    <button class="pos-btn" onclick="setPos('bottom-right')">右下</button>
    <button class="pos-btn" onclick="setPos('bottom-left')">左下</button>
  </div>
</div>

<script>
const chars=[
  {
    emoji:'🌸',name:'神里绫华',role:'任务完成助手 · SSR',
    color1:'#3d0a60',color2:'#0a1050',accent:'#ff80d0',
    msgs:[
      {side:'system',text:'✨ 搞定了：你好'},
      {side:'char',text:'主人，您的任务已全部完成了。请放心交给我吧♡'},
      {side:'user',text:'谢谢绫华！辛苦了'},
      {side:'char',text:'不……不辛苦的，能为主人效劳是绫华的荣幸（轻声）'},
    ],
    stat1:{num:'3',lbl:'待办任务'},stat2:{num:'78%',lbl:'同步进度'},
    affectionPct:'78%',hearts:'♥♥♥'
  },
  {
    emoji:'⚡',name:'雷电将军',role:'系统守护者 · SSR',
    color1:'#1a0a40',color2:'#0d0530',accent:'#a78bfa',
    msgs:[
      {side:'system',text:'⚙ 任务执行完毕'},
      {side:'char',text:'永恒之愿已达成。后续事项已列入管辖范围。'},
      {side:'user',text:'将军大人威武！'},
      {side:'char',text:'……（沉默片刻）……尚可。'},
    ],
    stat1:{num:'100%',lbl:'执行效率'},stat2:{num:'0',lbl:'遗漏项目'},
    affectionPct:'55%',hearts:'♥♥'
  },
  {
    emoji:'🔥',name:'诺艾尔',role:'骑士团通知官 · SR',
    color1:'#3d1500',color2:'#200a00',accent:'#fb923c',
    msgs:[
      {side:'system',text:'⚙ 后续待办清'},
      {side:'char',text:'任务报告完毕！请放心，诺艾尔会把剩余工作都打扫干净的！'},
      {side:'user',text:'好厉害！'},
      {side:'char',text:'嘿嘿，这点小事不算什么……（用力握拳）'},
    ],
    stat1:{num:'3',lbl:'待完成项'},stat2:{num:'95%',lbl:'完成率'},
    affectionPct:'90%',hearts:'♥♥♥♥'
  },
  {
    emoji:'🌙',name:'甘雨',role:'麒麟秘书 · SSR',
    color1:'#0a1e3d',color2:'#060d20',accent:'#93c5fd',
    msgs:[
      {side:'system',text:'✨ 搞定了：你好'},
      {side:'char',text:'报告已整理完毕。甘雨……随时准备好了（小声）'},
      {side:'user',text:'甘雨真的太可靠了！'},
      {side:'char',text:'（脸微红）……嗯，这……这是应该做的……'},
    ],
    stat1:{num:'12',lbl:'完成记录'},stat2:{num:'99%',lbl:'准确率'},
    affectionPct:'85%',hearts:'♥♥♥'
  }
];

let curChar=0,curPos='center';

function makeStars(){
  const s=document.getElementById('stars');
  s.innerHTML='';
  for(let i=0;i<55;i++){
    const d=document.createElement('div');
    const sz=Math.random()*2.5+0.5;
    d.className='star';
    d.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;opacity:${Math.random()*0.6+0.2};`;
    s.appendChild(d);
  }
}

function posStyle(p){
  const m={
    center:'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);',
    'top-right':'position:absolute;top:14px;right:14px;',
    'bottom-right':'position:absolute;bottom:14px;right:14px;',
    'bottom-left':'position:absolute;bottom:14px;left:14px;'
  };
  return m[p]||m.center;
}

function buildMsgs(c){
  return c.msgs.map((m,i)=>{
    if(m.side==='system') return `<div class="msg-bubble system" style="animation-delay:${i*0.12}s">${m.text}</div>`;
    if(m.side==='char') return `
      <div class="bubble-row" style="animation-delay:${i*0.15}s">
        <div class="mini-avatar char">${c.emoji}</div>
        <div class="msg-bubble char" style="animation-delay:${i*0.12}s">${m.text}</div>
      </div>`;
    return `
      <div class="bubble-row right" style="animation-delay:${i*0.15}s">
        <div class="mini-avatar user">👤</div>
        <div class="msg-bubble user" style="animation-delay:${i*0.12}s">${m.text}</div>
      </div>`;
  }).join('');
}

function render(){
  const c=chars[curChar];
  const html=`
<div class="popup-s6" id="the-popup" style="${posStyle(curPos)}">
  <div class="s6-header">
    <div class="s6-side-art" style="background:linear-gradient(175deg,${c.color1},${c.color2});">
      <div class="char-sprite">${c.emoji}</div>
    </div>
    <div class="s6-header-info">
      <div class="s6-app-name">claude-notify</div>
      <div class="s6-char-name">
        <div class="s6-online-dot" style="background:${c.accent};box-shadow:none;"></div>
        ${c.name}
      </div>
      <div class="s6-char-role">${c.role}</div>
    </div>
    <span class="s6-close" onclick="closeP()">×</span>
  </div>

  <div class="s6-body">
    ${buildMsgs(c)}
    <div class="typing-dots">
      <div class="dot" style="background:${c.accent}88;"></div>
      <div class="dot" style="background:${c.accent}88;"></div>
      <div class="dot" style="background:${c.accent}88;"></div>
    </div>
  </div>

  <div class="s6-stats">
    <div class="stat-chip"><div class="num" style="color:${c.accent}">${c.stat1.num}</div><div class="lbl">${c.stat1.lbl}</div></div>
    <div class="stat-chip"><div class="num" style="color:${c.accent}">${c.stat2.num}</div><div class="lbl">${c.stat2.lbl}</div></div>
    <div class="stat-chip"><div class="num" style="color:#fbbf24;font-size:13px;">${c.hearts}</div><div class="lbl">好感度</div></div>
  </div>

  <div class="s6-affection">
    <div class="affection-label">羁绊进度</div>
    <div class="affection-track">
      <div class="affection-fill" style="animation-name:none;width:${c.affectionPct};"></div>
    </div>
    <div class="affection-hearts">♥</div>
  </div>

  <div class="s6-footer">
    <button class="s6-btn ign" onclick="closeP()">下次再说</button>
    <button class="s6-btn main" style="background:linear-gradient(90deg,${c.color1.replace('3d','9d')},${c.accent});">和${c.name}对话 →</button>
  </div>
</div>`;
  document.getElementById('popup-wrap').innerHTML=html;
  const fill=document.querySelector('.affection-fill');
  if(fill){setTimeout(()=>{fill.style.transition='width 1.6s ease-out';fill.style.width=c.affectionPct;},50);}
}

function setChar(i,btn){
  curChar=i;
  document.querySelectorAll('.ctrl-btn:not(:last-child)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setPos(p){curPos=p;render();}
function replayAnim(){render();}
function closeP(){
  const p=document.getElementById('the-popup');
  if(p){p.style.transition='all 0.3s ease';p.style.transform+=' scale(0.7)';p.style.opacity='0';setTimeout(()=>p.remove(),300);}
}

makeStars();
render();
</script>
