
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{padding:1.5rem;font-family:var(--font-sans);}
.preview-scene{
  width:100%;min-height:360px;
  background:linear-gradient(160deg,#0e0720 0%,#160d35 40%,#0a1a2e 100%);
  border-radius:16px;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
.scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:1;}
.popup-s6{
  width:330px;background:rgba(8,4,20,0.93);border-radius:12px;
  border:1px solid rgba(255,120,200,0.35);overflow:hidden;
  position:absolute;animation:waifu-pop 0.55s cubic-bezier(0.34,1.56,0.64,1) both;z-index:10;
}
@keyframes waifu-pop{0%{transform:scale(0.4) rotate(-6deg) translateY(40px);opacity:0;}60%{transform:scale(1.06) rotate(1deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
.s6-header{display:flex;align-items:stretch;border-bottom:1px solid rgba(255,120,200,0.2);position:relative;overflow:hidden;}
.s6-side-art{width:96px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;padding-top:0;position:relative;overflow:hidden;}
.s6-side-art::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,120,200,0.03) 0px,rgba(255,120,200,0.03) 1px,transparent 1px,transparent 8px);}
.char-svg{width:96px;height:110px;display:block;position:relative;z-index:1;animation:charFloat 3s ease-in-out infinite;}
@keyframes charFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.s6-header-info{flex:1;padding:10px 10px 10px 12px;display:flex;flex-direction:column;justify-content:center;gap:4px;}
.s6-app-name{font-size:10px;color:rgba(255,160,220,0.7);letter-spacing:1.5px;}
.s6-char-name{font-size:15px;color:#ffe0f4;font-weight:600;display:flex;align-items:center;gap:6px;}
.s6-online-dot{width:7px;height:7px;border-radius:50%;animation:pulse-dot 1.5s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(255,110,180,0.6);}50%{box-shadow:0 0 0 5px rgba(255,110,180,0);}}
.s6-char-role{font-size:11px;color:rgba(200,150,255,0.8);}
.s6-close{position:absolute;top:8px;right:10px;color:rgba(255,160,220,0.5);font-size:18px;cursor:pointer;line-height:1;}
.s6-body{padding:10px 14px 6px;}
.bubble-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px;}
.bubble-row.right{flex-direction:row-reverse;}
.mini-avatar{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;border:1.5px solid rgba(255,120,200,0.4);}
.mini-avatar.char{background:linear-gradient(135deg,#4a1060,#1a0a40);}
.mini-avatar.user{background:linear-gradient(135deg,#0a2a4a,#082040);color:#93c5fd;}
.msg-bubble{max-width:195px;padding:7px 10px;border-radius:12px;font-size:12px;line-height:1.5;animation:msgIn 0.3s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.msg-bubble.char{background:rgba(80,20,120,0.7);border:1px solid rgba(255,120,200,0.25);color:#f0d0ff;border-radius:2px 12px 12px 12px;}
.msg-bubble.system{background:rgba(0,0,0,0.4);border:1px solid rgba(255,200,100,0.2);color:#ffe8a0;border-radius:8px;font-size:11px;text-align:center;margin:0 auto 8px;padding:4px 12px;display:block;width:100%;}
.typing-dots{display:flex;gap:4px;padding:6px 14px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,120,200,0.7);animation:typeDot 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
@keyframes typeDot{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-4px);opacity:1;}}
.s6-stats{display:flex;gap:6px;padding:0 14px 8px;}
.stat-chip{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,120,200,0.15);border-radius:8px;padding:5px 6px;text-align:center;}
.stat-chip .num{font-size:15px;font-weight:700;}.stat-chip .lbl{font-size:10px;color:rgba(200,150,255,0.6);margin-top:1px;}
.s6-affection{padding:0 14px 10px;display:flex;align-items:center;gap:8px;}
.aff-label{font-size:10px;color:rgba(255,160,220,0.6);white-space:nowrap;}
.aff-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.aff-fill{height:100%;background:linear-gradient(90deg,#c026d3,#ff6eb4,#fbbf24);border-radius:4px;transition:width 1.6s ease-out;}
.aff-hearts{font-size:12px;color:#ff6eb4;animation:heartbeat 1s ease-in-out infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}
.s6-footer{padding:8px 14px 12px;border-top:1px solid rgba(255,120,200,0.12);display:flex;gap:8px;}
.s6-btn{flex:1;padding:8px 0;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.s6-btn.ign{background:rgba(255,255,255,0.06);border:1px solid rgba(255,120,200,0.2);color:rgba(255,160,220,0.7);}
.s6-btn.main{color:white;}
.s6-btn.main:hover{filter:brightness(1.15);transform:translateY(-1px);}
.controls-row{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ctrl-btn{padding:7px 14px;border-radius:20px;border:1.5px solid rgba(255,120,200,0.3);background:rgba(255,120,200,0.08);color:rgba(255,200,240,0.9);font-size:12px;cursor:pointer;transition:all 0.2s;}
.ctrl-btn:hover{background:rgba(255,120,200,0.18);}
.ctrl-btn.active{background:rgba(255,110,180,0.25);border-color:#ff6eb4;color:#ff9de2;font-weight:600;}
.pos-row{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;}
.pos-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;}
.pos-btn:hover{background:var(--color-background-secondary);}
.slabel{font-size:12px;color:var(--color-text-secondary);font-weight:500;margin-bottom:6px;}
</style>

<div class="wrap">
<h2 class="sr-only">宅男风格二次元弹窗-手绘立绘版</h2>
<div class="preview-scene" id="scene">
  <div class="stars" id="stars"></div>
  <div class="scanline"></div>
  <div id="popup-wrap"></div>
</div>
<div class="controls-row">
  <span class="slabel">切换角色：</span>
  <button class="ctrl-btn active" onclick="setChar(0,this)">🌸 绫华</button>
  <button class="ctrl-btn" onclick="setChar(1,this)">⚡ 将军</button>
  <button class="ctrl-btn" onclick="setChar(2,this)">🔥 诺艾尔</button>
  <button class="ctrl-btn" onclick="setChar(3,this)">🌙 甘雨</button>
  <button class="ctrl-btn" onclick="replayAnim()">↺ 重播</button>
</div>
<div class="pos-row">
  <button class="pos-btn" onclick="setPos('center')">居中</button>
  <button class="pos-btn" onclick="setPos('top-right')">右上</button>
  <button class="pos-btn" onclick="setPos('bottom-right')">右下</button>
  <button class="pos-btn" onclick="setPos('bottom-left')">左下</button>
</div>
</div>

let curChar=0, curPos='center';

function makeStars(){
  const s=document.getElementById('stars');s.innerHTML='';
  for(let i=0;i<55;i++){
    const d=document.createElement('div'),sz=Math.random()*2.5+0.5;
    d.className='star';
    d.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;`;
    s.appendChild(d);
  }
}

function posStyle(p){
  return {
    center:'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);',
    'top-right':'position:absolute;top:14px;right:14px;',
    'bottom-right':'position:absolute;bottom:14px;right:14px;',
    'bottom-left':'position:absolute;bottom:14px;left:14px;'
  }[p]||'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);';
}

function buildMsgs(c){
  return c.msgs.map((m,i)=>{
    const d=`animation-delay:${i*0.15}s`;
    if(m.side==='system') return `<div class="msg-bubble system" style="${d}">${m.text}</div>`;
    if(m.side==='char') return `<div class="bubble-row" style="${d}"><div class="mini-avatar char" style="background:${c.headerBg}">✦</div><div class="msg-bubble char" style="${d}">${m.text}</div></div>`;
    return `<div class="bubble-row right" style="${d}"><div class="mini-avatar user">你</div><div class="msg-bubble user" style="${d}">${m.text}</div></div>`;
  }).join('');
}

  const c=chars[curChar];

function setChar(i,btn){
  curChar=i;
  document.querySelectorAll('.ctrl-btn').forEach((b,idx)=>{if(idx<4)b.classList.remove('active');});
  btn.classList.add('active');
  render();
}
function setPos(p){curPos=p;render();}
function replayAnim(){render();}
function closeP(){
  const p=document.getElementById('the-popup');
  if(p){p.style.transition='all 0.3s ease';p.style.opacity='0';p.style.transform=(p.style.transform||'')+' scale(0.7)';setTimeout(()=>p.remove(),300);}
