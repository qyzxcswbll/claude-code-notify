<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>优雅弹窗 - 主题预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #11111b; font-family: 'Segoe UI', -apple-system, sans-serif; padding: 40px; }
  h1 { color: #fff; font-size: 24px; margin-bottom: 4px; }
  .sub { color: #6c7086; margin-bottom: 30px; }

  .theme-gallery { display: flex; gap: 24px; flex-wrap: wrap; }

  /* ===== 通知卡片基类 ===== */
  .toast-card {
    width: 380px;
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .toast-card:hover { transform: translateY(-4px); box-shadow: 0 12px 48px rgba(0,0,0,0.5); }
  .toast-card .close { position: absolute; top: 12px; right: 14px; color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer; }
  .toast-card .close:hover { color: rgba(255,255,255,0.8); }
  .toast-card .title-area { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .toast-card .title-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .toast-card .title { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }
  .toast-card .meta { font-size: 12px; margin-bottom: 10px; padding-left: 38px; display: flex; align-items: center; gap: 6px; }
  .toast-card .divider { height: 1px; margin: 8px 0 10px 38px; }
  .toast-card .body { font-size: 14px; padding-left: 38px; line-height: 1.5; display: flex; justify-content: space-between; align-items: center; }
  .toast-card .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .toast-card .time { font-size: 11px; opacity: 0.5; margin-top: 4px; text-align: right; }

  /* ===== 主题 1：深色简洁 ===== */
  .theme-default { background: #1e1e2e; border: 1px solid #313244; color: #cdd6f4; }
  .theme-default .title-icon { background: linear-gradient(135deg, #d4a574, #b8845a); }
  .theme-default .divider { background: #313244; }
  .theme-default .tag { background: rgba(166,227,161,0.15); color: #a6e3a1; }

  /* ===== 主题 2：二次元粉紫 ===== */
  .theme-anime {
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
    border: 1px solid rgba(180, 120, 255, 0.25);
    color: #e8d5ff;
  }
  .theme-anime::before {
    content: '🌸';
    position: absolute;
    bottom: -10px; right: -10px;
    font-size: 80px; opacity: 0.08;
  }
  .theme-anime .title-icon { background: linear-gradient(135deg, #c084fc, #7c3aed); box-shadow: 0 2px 12px rgba(124,58,237,0.4); }
  .theme-anime .divider { background: linear-gradient(90deg, rgba(180,120,255,0.3), transparent); }
  .theme-anime .tag { background: rgba(192,132,252,0.2); color: #c084fc; }
  .theme-anime .meta { color: #a78bfa; }

  /* ===== 主题 3：赛博朋克 ===== */
  .theme-cyber {
    background: #0d0d1a;
    border: 1px solid rgba(0, 255, 255, 0.2);
    color: #00ffcc;
  }
  .theme-cyber::before {
    content: '⚡';
    position: absolute;
    top: -20px; right: -10px;
    font-size: 90px; opacity: 0.06;
    transform: rotate(15deg);
  }
  .theme-cyber .title-icon { background: linear-gradient(135deg, #00ffcc, #ff00ff); box-shadow: 0 0 16px rgba(0,255,204,0.3); }
  .theme-cyber .divider { background: linear-gradient(90deg, rgba(0,255,204,0.3), transparent); }
  .theme-cyber .tag { background: rgba(0,255,204,0.15); color: #00ffcc; border: 1px solid rgba(0,255,204,0.2); }
  .theme-cyber .meta { color: #ff00ff; }

  /* ===== 主题 4：萌系像素风 ===== */
  .theme-kawaii {
    background: linear-gradient(135deg, #fff5f9, #ffe0ec);
    border: 2px solid #ffb6d9;
    color: #4a1a2e;
  }
  .theme-kawaii::before {
    content: '🎀';
    position: absolute;
    top: -8px; left: -8px;
    font-size: 40px; opacity: 0.2;
    transform: rotate(-20deg);
  }
  .theme-kawaii .title-icon { background: linear-gradient(135deg, #ff87b5, #ff4d94); box-shadow: 0 2px 8px rgba(255,77,148,0.3); }
  .theme-kawaii .divider { background: rgba(255,77,148,0.15); }
  .theme-kawaii .tag { background: rgba(255,77,148,0.12); color: #d6336c; }
  .theme-kawaii .meta { color: #ff6b9d; }
  .theme-kawaii .close { color: rgba(74,26,46,0.3); }

  /* ===== 主题 5：和风 ===== */
  .theme-wa {
    background: linear-gradient(135deg, #f5f0e8, #e8dccc);
    border: 1px solid #c4a882;
    color: #3d2e1e;
  }
  .theme-wa::before {
    content: '⛩️';
    position: absolute;
    bottom: -5px; right: -5px;
    font-size: 70px; opacity: 0.06;
  }
  .theme-wa .title-icon { background: linear-gradient(135deg, #c4a882, #a67c52); }
  .theme-wa .divider { background: rgba(164,120,82,0.2); }
  .theme-wa .tag { background: rgba(164,120,82,0.12); color: #8b6914; }
  .theme-wa .meta { color: #8b6914; }
  .theme-wa .close { color: rgba(61,46,30,0.3); }

  /* ===== 主题 6：Mac 毛玻璃 ===== */
  .theme-mac {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.3);
    color: #1d1d1f;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(255,255,255,0.5) inset;
  }
  .theme-mac .title-icon { background: linear-gradient(135deg, #d4a574, #b8845a); }
  .theme-mac .divider { background: rgba(0,0,0,0.06); }
  .theme-mac .tag { background: rgba(52,199,89,0.12); color: #34c759; }
  .theme-mac .meta { color: #86868b; }
  .theme-mac .close { color: rgba(0,0,0,0.2); }
  .theme-mac .time { color: #86868b; }

  /* ===== 选择器 ===== */
  .theme-selector { display: flex; gap: 10px; margin: 30px 0; flex-wrap: wrap; }
  .theme-btn {
    padding: 8px 18px; border-radius: 20px; border: 1px solid #313244;
    background: #1e1e2e; color: #cdd6f4; cursor: pointer; font-size: 13px;
    transition: all 0.2s;
  }
  .theme-btn:hover { border-color: #89b4fa; background: #252540; }
  .theme-btn.active { border-color: #a6e3a1; background: #1e3a2e; color: #a6e3a1; }
  .theme-label { color: #6c7086; font-size: 13px; margin-bottom: 8px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .preview-section { margin-top: 20px; }
  .preview-section h2 { color: #fff; font-size: 18px; margin-bottom: 4px; }
  .preview-section .hint { color: #6c7086; font-size: 13px; margin-bottom: 20px; }

  .custom-section { margin-top: 40px; padding: 24px; background: #18182a; border-radius: 14px; border: 1px solid #313244; }
  .custom-section h3 { color: #fff; font-size: 16px; margin-bottom: 16px; }
  .custom-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .custom-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1e1e2e; border-radius: 10px; border: 1px solid #313244; }
  .custom-item label { color: #cdd6f4; font-size: 14px; }
  .custom-item input[type="range"] { flex: 1; accent-color: #89b4fa; }
  .custom-item .val { color: #6c7086; font-size: 13px; min-width: 30px; text-align: right; }
  .color-row { display: flex; gap: 8px; align-items: center; }
  .color-row input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: transparent; }
</style>
</head>
<body>
<h1>🎨 优雅弹窗 · 主题预览</h1>
<div class="sub">点击主题切换效果，定制化参数在下方调节</div>

<div class="theme-selector">
  <button class="theme-btn active" onclick="switchTheme('default')">🌙 深色简洁</button>
  <button class="theme-btn" onclick="switchTheme('anime')">🌸 二次元粉紫</button>
  <button class="theme-btn" onclick="switchTheme('kawaii')">🎀 萌系像素</button>
  <button class="theme-btn" onclick="switchTheme('wa')">⛩️ 和风</button>
  <button class="theme-btn" onclick="switchTheme('cyber')">⚡ 赛博朋克</button>
  <button class="theme-btn" onclick="switchTheme('mac')">🪟 Mac 毛玻璃</button>
</div>

<div id="preview-area">
  <div class="toast-card theme-default" id="toast-card">
    <span class="close">✕</span>
    <div class="title-area">
      <div class="title-icon">⚙️</div>
      <span class="title">claude-code-notify</span>
    </div>
    <div class="meta">
      <span>💬 重构代码</span>
      <span style="margin-left:auto;font-size:11px;opacity:0.5">刚才</span>
    </div>
    <div class="divider"></div>
    <div class="body">
      <span>✨ 搞定了：把所有 .ts 重构为 .js</span>
      <span class="tag">完成</span>
    </div>
  </div>
</div>

<div class="custom-section">
  <h3>🎛️ 定制参数</h3>
  <div class="custom-grid">
    <div class="custom-item">
      <label>圆角大小</label>
      <input type="range" min="4" max="32" value="16" id="radius" oninput="updateCustom()">
      <span class="val" id="radius-val">16</span>
    </div>
    <div class="custom-item">
      <label>不透明度</label>
      <input type="range" min="50" max="100" value="100" id="opacity" oninput="updateCustom()">
      <span class="val" id="opacity-val">100</span>
    </div>
    <div class="custom-item">
      <label>显示时长 (s)</label>
      <input type="range" min="2" max="15" value="5" id="duration" oninput="updateCustom()">
      <span class="val" id="duration-val">5</span>
    </div>
    <div class="custom-item">
      <label>边框发光</label>
      <input type="range" min="0" max="20" value="0" id="glow" oninput="updateCustom()">
      <span class="val" id="glow-val">0</span>
    </div>
  </div>
</div>

<script>
function switchTheme(theme) {
  const card = document.getElementById('toast-card');
  card.className = 'toast-card';
  card.classList.add('theme-' + theme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function updateCustom() {
  const r = document.getElementById('radius').value;
  document.getElementById('radius-val').textContent = r;
  document.getElementById('toast-card').style.borderRadius = r + 'px';

  const o = document.getElementById('opacity').value;
  document.getElementById('opacity-val').textContent = o;
  document.getElementById('toast-card').style.opacity = o / 100;

  const g = document.getElementById('glow').value;
  document.getElementById('glow-val').textContent = g;
  document.getElementById('toast-card').style.boxShadow = g > 0 ? `0 0 ${g*2}px rgba(137,180,250,0.3)` : '';
}
</script>
</body>
</html>
