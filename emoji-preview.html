<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>通知 Emoji 预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #11111b; font-family: 'Segoe UI', -apple-system, sans-serif; padding: 40px; color: #cdd6f4; }
  h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
  .sub { color: #6c7086; margin-bottom: 32px; font-size: 14px; }
  .category { margin-bottom: 28px; }
  .cat-title { font-size: 14px; color: #a6adc8; margin-bottom: 12px; font-weight: 600; letter-spacing: 1px; }
  .grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .card {
    background: #1e1e2e; border: 1px solid #313244; border-radius: 10px;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: all 0.2s; font-size: 14px;
  }
  .card:hover { border-color: #89b4fa; background: #252540; }
  .card .emoji { font-size: 24px; line-height: 1; }
  .card .name { color: #6c7086; font-size: 12px; }
  .card.selected { border-color: #a6e3a1; background: #1e3a2e; }

  /* 预览区 */
  .preview-section { margin-top: 40px; padding: 24px; background: #18182a; border-radius: 14px; border: 1px solid #313244; }
  .preview-section h2 { font-size: 16px; margin-bottom: 16px; color: #fff; }
  .preview-box {
    width: 380px; background: #1e1e2e; border: 1px solid #313244; border-radius: 14px;
    padding: 18px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .preview-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .preview-sub { font-size: 12px; color: #6c7086; margin-bottom: 8px; }
  .preview-sub .icon { margin-right: 4px; }
  .preview-body { font-size: 14px; color: #cdd6f4; }
  .preview-divider { height: 1px; background: #313244; margin: 8px 0; }

  .selected-list { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
  .selected-item { background: #252540; padding: 8px 14px; border-radius: 8px; font-size: 20px; border: 1px solid #45475a; display: flex; align-items: center; gap: 8px; }
  .selected-item .del { color: #f87171; cursor: pointer; font-size: 14px; }
  .placeholder { color: #585b70; font-size: 13px; }

  .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #313244; font-size: 13px; color: #585b70; }
  .footer code { background: #1e1e2e; padding: 2px 6px; border-radius: 4px; color: #a6adc8; }
</style>
</head>
<body>

<h1>🔔 通知 Emoji 选型</h1>
<div class="sub">点击选择副标题图标（💎 蓝色钻石），点击多个可对比</div>

<div class="category">
  <div class="cat-title">◆ 几何 / 符号</div>
  <div class="grid" id="geo"></div>
</div>

<div class="category">
  <div class="cat-title">◆ 形状</div>
  <div class="grid" id="shape"></div>
</div>

<div class="category">
  <div class="cat-title">◆ 箭头 / 指向</div>
  <div class="grid" id="arrow"></div>
</div>

<div class="category">
  <div class="cat-title">◆ 蓝色系（不撞色 ✨ 💬）</div>
  <div class="grid" id="blue"></div>
</div>

<div class="category">
  <div class="cat-title">◆ 其它推荐</div>
  <div class="grid" id="other"></div>
</div>

<div class="preview-section">
  <h2>📱 通知预览（点击上方 emoji 切换）</h2>
  <div class="preview-box">
    <div class="preview-title">claude-code-notify</div>
    <div class="preview-sub"><span class="icon" id="preview-icon">💎</span><span id="preview-session">配置通知</span></div>
    <div class="preview-divider"></div>
    <div class="preview-body">✨ 搞定了: 把项目重构为 .js</div>
  </div>
  <div style="margin-top: 12px; color: #6c7086; font-size: 13px;">
    当前选中：<span id="selected-display">💎 蓝色钻石</span>
  </div>
</div>

<div class="footer">
  💡 点击任意 emoji 实时预览效果。<br>
  告诉 AI "副标题图标换成 XXX" 即可更改。
</div>

<script>
const emojis = {
  geo: [
    { e: '▪️', n: '黑色方块' }, { e: '▫️', n: '白色方块' }, { e: '🔹', n: '蓝色小方块' },
    { e: '🔸', n: '橙色小方块' }, { e: '🔺', n: '红色三角' }, { e: '🔻', n: '红色倒三角' },
    { e: '◼️', n: '黑色中方块' }, { e: '◻️', n: '白色中方块' }, { e: '◾', n: '黑色中小块' },
    { e: '◽', n: '白色中小块' }, { e: '🔶', n: '橙色大菱形' }, { e: '🔷', n: '蓝色大菱形' },
    { e: '💠', n: '蓝色菱形点' },
  ],
  shape: [
    { e: '●', n: '黑色圆' }, { e: '○', n: '白色圆' }, { e: '🔴', n: '红色圆' },
    { e: '🟠', n: '橙色圆' }, { e: '🟡', n: '黄色圆' }, { e: '🟢', n: '绿色圆' },
    { e: '🔵', n: '蓝色圆' }, { e: '🟣', n: '紫色圆' }, { e: '🟤', n: '棕色圆' },
    { e: '⚪', n: '白色圆' }, { e: '⚫', n: '黑色圆' }, { e: '❤️', n: '红心' },
    { e: '🧡', n: '橙心' }, { e: '💛', n: '黄心' }, { e: '💚', n: '绿心' },
    { e: '💙', n: '蓝心' }, { e: '💜', n: '紫心' }, { e: '🖤', n: '黑心' },
    { e: '💎', n: '蓝色钻石' },
  ],
  arrow: [
    { e: '▸', n: '右三角' }, { e: '▹', n: '右三角细' }, { e: '▶️', n: '播放' },
    { e: '➡️', n: '右箭头' }, { e: '→', n: '箭头' }, { e: '↳', n: '折线箭头' },
    { e: '⤵', n: '右下箭头' }, { e: '⇢', n: '虚线箭头' }, { e: '⚡', n: '闪电' },
    { e: '⌁', n: '充电' },
  ],
  blue: [
    { e: '💎', n: '蓝色钻石（当前）' }, { e: '🔹', n: '蓝色小方块' },
    { e: '🔷', n: '蓝色大菱形' }, { e: '💠', n: '蓝色菱形点' },
    { e: '🔵', n: '蓝色圆' }, { e: '💙', n: '蓝心' },
    { e: '🌀', n: '旋风' }, { e: '🌊', n: '波浪' },
    { e: '❄️', n: '雪花' }, { e: '💧', n: '水滴' },
    { e: '🧊', n: '冰块' }, { e: '🔮', n: '水晶球' },
  ],
  other: [
    { e: '📍', n: '图钉' }, { e: '📌', n: '别针' }, { e: '🔖', n: '书签' },
    { e: '🎯', n: '靶心' }, { e: '🏷️', n: '标签' }, { e: '📎', n: '回形针' },
    { e: '🔗', n: '链接' }, { e: '⚙️', n: '齿轮' }, { e: '🛠️', n: '工具' },
    { e: '💡', n: '灯泡' }, { e: '🔔', n: '铃铛' }, { e: '🔕', n: '静音铃铛' },
    { e: '📋', n: '剪贴板' }, { e: '📁', n: '文件夹' }, { e: '📂', n: '打开文件夹' },
    { e: '📄', n: '文档' }, { e: '📝', n: '备忘录' }, { e: '✏️', n: '铅笔' },
    { e: '⭐', n: '星星' }, { e: '🌟', n: '闪亮星星' }, { e: '✨', n: '闪光（与内容冲突❌）' },
  ]
};

let currentEmoji = '💎';

function render(cat, id) {
  const container = document.getElementById(id);
  emojis[cat].forEach(item => {
    const card = document.createElement('div');
    card.className = 'card' + (item.e === currentEmoji ? ' selected' : '');
    card.innerHTML = `<span class="emoji">${item.e}</span><span>${item.n}</span>`;
    card.onclick = () => selectEmoji(item.e);
    container.appendChild(card);
  });
}

function selectEmoji(e) {
  currentEmoji = e;
  document.querySelectorAll('.card').forEach(c => {
    const em = c.querySelector('.emoji')?.textContent;
    c.classList.toggle('selected', em === e);
  });
  document.getElementById('preview-icon').textContent = e;
  document.getElementById('selected-display').textContent = e;
}

render('geo', 'geo');
render('shape', 'shape');
render('arrow', 'arrow');
render('blue', 'blue');
render('other', 'other');
</script>
</body>
</html>
